apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vfr-watch
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: vfr-watch.example.com  # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vfr-frontend
                port:
                  number: 80
