apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vfr-outlook
  annotations:
    metallb.universe.tf/address-pool: pool
spec:
  ingressClassName: traefik
  rules:
    - host: vfr.broken-top.com    # replace with your domain
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vfr-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vfr-frontend
                port:
                  number: 80
---
# MetalLB LoadBalancer for the frontend UI — gets a public IP from MetalLB.
# Both services share the same IP via the allow-shared-ip annotation so a
# single external address serves the UI (port 80) and the API (port 8000).
apiVersion: v1
kind: Service
metadata:
  name: vfr-frontend-lb
  annotations:
    metallb.universe.tf/address-pool: pool
    metallb.universe.tf/allow-shared-ip: vfr-outlook
spec:
  type: LoadBalancer
  selector:
    app: vfr-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: vfr-backend-lb
  annotations:
    metallb.universe.tf/address-pool: pool
    metallb.universe.tf/allow-shared-ip: vfr-outlook
spec:
  type: LoadBalancer
  selector:
    app: vfr-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
