apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vfr-outlook
spec:
  ingressClassName: traefik
  rules:
    - host: vfr.broken-top.com    # replace with your domain
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vfr-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vfr-frontend
                port:
                  number: 80