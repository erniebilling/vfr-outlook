apiVersion: apps/v1
kind: Deployment
metadata:
  name: vfr-frontend
  labels:
    app: vfr-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vfr-frontend
  template:
    metadata:
      labels:
        app: vfr-frontend
    spec:
      containers:
        - name: vfr-frontend
          image: vfr-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vfr-frontend
spec:
  selector:
    app: vfr-frontend
  ports:
    - port: 80
      targetPort: 80
