# Secret stubs — fill in values before applying. Never commit real secrets.
#
# The local registry (registry.registry.svc.cluster.local:5000) does not
# require authentication, so no docker-registry secret is needed for pushing.
#
# The OpenAIP API key must exist in BOTH namespaces:
#   - tekton-pipelines: used by the build-frontend Task at build time
#   - vfr-outlook: used by the running frontend pod at runtime (VITE vars are
#     baked in at build time, so this is only needed if your app reads it at
#     runtime as well)
#
#   kubectl create secret generic openaip-credentials \
#     --from-literal=api-key=YOUR_OPENAIP_API_KEY \
#     -n tekton-pipelines
#
#   kubectl create secret generic openaip-credentials \
#     --from-literal=api-key=YOUR_OPENAIP_API_KEY \
#     -n vfr-outlook
#
# The GitHub webhook secret already exists in tekton-pipelines:
#   kubectl get secret github-webhook-secret -n tekton-pipelines
#
# The stub below is for GitOps tooling (e.g. Sealed Secrets).
# Replace <base64-...> with your actual base64-encoded value.
---
# Stub for tekton-pipelines namespace (used by build-frontend Task)
apiVersion: v1
kind: Secret
metadata:
  name: openaip-credentials
  namespace: tekton-pipelines
type: Opaque
data:
  api-key: <base64-encoded-openaip-api-key>
---
# Stub for vfr-outlook namespace (used by running pods if needed at runtime)
apiVersion: v1
kind: Secret
metadata:
  name: openaip-credentials
  namespace: vfr-outlook
type: Opaque
data:
  api-key: <base64-encoded-openaip-api-key>
